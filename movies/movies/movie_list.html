<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cinespoilers | Películas</title>
</head>
<body>
    <main>
        <h1>Películas</h1>

        {% if movies %}
            <ul>
                {% for movie in movies %}
                    <li>
                        <h2>{{ movie.title }}</h2>
                        <p><strong>Fecha de estreno:</strong> {{ movie.release_date }}</p>
                        <p>{{ movie.synopsis }}</p>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No hay películas registradas.</p>
        {% endif %}
    </main>
</body>
</html>
